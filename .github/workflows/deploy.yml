name: Build, push and run ECS task

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: sa-east-1
  AWS_ACCOUNT_ID: "054037115983"
  ECR_REPOSITORY: siurb-vigencia-sof
  ECS_CLUSTER: siurb-prod
  TASK_FAMILY: siurb-vigencia-sof
  CONTAINER_NAME: siurb-vigencia-sof
  SUBNET_ID: subnet-0f0e54951cd13d80d
  SECURITY_GROUP_ID: sg-002275a7e3f48787f

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::054037115983:role/github-actions-vigencia-sof-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug caller identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "054037115983"

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA::12}" >> $GITHUB_ENV

      - name: Build image
        run: docker build -t "$IMAGE_URI" .

      - name: Push image
        run: docker push "$IMAGE_URI"

      - name: Render task definition
        run: |
          sed "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" .github/workflows/task-definition-template.json > task-definition.json
          cat task-definition.json

      - name: Register new task definition revision
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV
          echo "Registered: $TASK_DEF_ARN"

      - name: Run task
        run: |
          aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF_ARN" \
            --count 1 \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SECURITY_GROUP_ID],assignPublicIp=DISABLED}" \
            --region "$AWS_REGION"
